<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff1f5, #f4f6ff);
            margin: 0;
            padding: 30px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .header input {
            width: 40%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        /* PRODUCT */
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .product-image img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 15px;
        }

        .product-info h1 {
            margin-top: 0;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: #c05685;
            margin: 15px 0;
        }

        .desc {
            color: #555;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff8fb1, #a18cd1);
            color: white;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>🛒 MyShop</h2>
    <form method="GET" action="/" style="width:40%;">
        <input 
            type="text" 
            name="q" 
            placeholder="Поиск товаров..." 
            value="{{ query|default:'' }}"
            style="width:100%; padding:10px; border-radius:12px; border:1px solid #ddd;"
        >
    </form>
    <a href="{% url 'cart' %}" style="text-decoration: none; font-size: 20px;">
        🛍️
    </a>
</div>

<a href="/" class="back">← Назад</a>

<div class="product-container">

    <!-- IMAGE -->
    <div class="product-image">
        {% if product.image %}
            <img src="{{ product.image }}">
        {% else %}
            <img src="https://via.placeholder.com/400?text=🛒">
        {% endif %}
    </div>

    <!-- INFO -->
    <div class="product-info">

        <h1>{{ product.name }}</h1>

        <div class="price">
            {{ product.get_price }} ₸
        </div>

        <div class="desc">
            {{ product.description }}
        </div>

        <a href="{% url 'add_to_cart' product.id %}" class="btn">
            🛒 В корзину
        </a>
    </div>

</div>

</body>
</html>
