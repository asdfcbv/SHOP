<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ category.name }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff1f5, #f4f6ff);
            margin: 0;
            padding: 40px;
        }

        /* HEADER (НОВОЕ) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .header h2 {
            margin: 0;
        }

        .header input {
            width: 40%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .cart {
            font-size: 18px;
            cursor: pointer;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
            color: #3a2d3f;
        }

        .layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }

        /* SIDEBAR */
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            margin-bottom: 10px;
            text-decoration: none;
            color: #3a2d3f;
            transition: 0.2s;
        }

        .sidebar a:hover {
            color: #c05685;
        }

        /* PRODUCTS GRID */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: linear-gradient(180deg, #ffffff, #faf6ff);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(197, 134, 157, 0.2);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(160, 110, 150, 0.3);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .product-card h3 {
            font-size: 18px;
            margin: 10px 0;
        }

        .price {
            font-size: 16px;
            font-weight: 600;
            color: #c05685;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff8fb1, #a18cd1);
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

    </style>
</head>

<body>

<!-- 🔥 HEADER (ДОБАВЛЕНО) -->
<div class="header">
    <h2>🛒 MyShop</h2>

    <form method="GET" action="/" style="width:40%;">
        <input 
            type="text" 
            name="q" 
            placeholder="Поиск товаров..." 
            value="{{ query|default:'' }}"
            style="width:100%; padding:10px; border-radius:12px; border:1px solid #ddd;"
        >
    </form>

    <a href="{% url 'cart' %}" style="text-decoration: none; font-size: 20px;">
        🛍️
    </a>
</div>

<h1>🛍️ {{ category.name }}</h1>

<div class="layout">

    <!-- САЙДБАР -->
    <div class="sidebar">
        <h3>Категории</h3>
        {% for cat in categories %}
            <a href="{% url 'products_by_category' cat.id %}">
                {{ cat.name }}
            </a>
        {% endfor %}
    </div>

    <!-- ТОВАРЫ -->
    <div class="products">
        {% for product in products %}
            <div class="product-card">

                {% if product.image %}
                    <img src="{{ product.image }}" alt="{{ product.name }}">
                {% else %}
                    <img src="https://via.placeholder.com/200?text=🛒" alt="no image">
                {% endif %}

                <h3>{{ product.name }}</h3>

                <div class="price">
                    {{ product.get_price }} ₸
                </div>

                <a href="{% url 'product_detail' product.id %}" class="btn">
                    Подробнее
                </a>

            </div>
        {% empty %}
            <p>Нет товаров</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
