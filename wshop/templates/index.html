<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff1f5, #f4f6ff);
            margin: 0;
            padding: 30px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .header input {
            width: 40%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        /* LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 25px;
            align-items: start;
        }

        /* SIDEBAR */
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            margin-top: 0;
        }

        .sidebar a {
            display: block;
            padding: 8px 0;
            text-decoration: none;
            color: #3a2d3f;
            transition: 0.2s;
        }

        .sidebar a:hover {
            color: #c05685;
        }

        /* PRODUCTS */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-6px);
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: contain;
            border-radius: 10px;
        }

        .price {
            font-weight: bold;
            color: #c05685;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff8fb1, #a18cd1);
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        h1 {
            margin: 10px 0 20px;
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>🛒 MyShop</h2>
    <form method="GET" action="/" style="width:40%;">
        <input 
            type="text" 
            name="q" 
            placeholder="Поиск товаров..." 
            value="{{ query|default:'' }}"
            style="width:100%; padding:10px; border-radius:12px; border:1px solid #ddd;"
        >
    </form>
    <a href="{% url 'cart' %}" style="text-decoration: none; font-size: 20px;">
        🛍️
    </a>
</div>

<h1>🔥 Все товары</h1>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Категории</h3>

        {% for category in categories %}
            <a href="{% url 'products_by_category' category.id %}">
                {{ category.name }}
            </a>
        {% endfor %}
    </div>

    <!-- PRODUCTS -->
    <div class="products">

        {% for product in products %}
            <div class="product-card">

                {% if product.image %}
                    <img src="{{ product.image }}">
                {% else %}
                    <img src="https://via.placeholder.com/200?text=🛒">
                {% endif %}

                <h3>{{ product.name }}</h3>

                <div class="price">
                    {{ product.get_price }} ₸
                </div>

                <a href="{% url 'product_detail' product.id %}" class="btn">
                    Подробнее
                </a>

            </div>
        {% empty %}
            <p>Нет товаров</p>
        {% endfor %}

    </div>

</div>

</body>
</html>
